services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ecommerce-api
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env.production
    depends_on:
      mongo:
        condition: service_healthy
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongo:
    image: mongo:7
    container_name: ecommerce-mongo
    volumes:
      - mongo_data:/data/db
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongo_data:
