# ═══════════════════════════════════════════════
#  docker-compose.prod.yml — Producción (EC2)
# ═══════════════════════════════════════════════
#  Usa la imagen con target: production.
#  Las variables de entorno se inyectan desde
#  .env.production mediante env_file. Ese archivo
#  se crea manualmente en el servidor, jamás se
#  sube a GitHub (está en .gitignore).
#
#  Para levantar:
#    docker compose -f docker-compose.prod.yml up -d
#
#  Para ver logs:
#    docker compose -f docker-compose.prod.yml logs -f
# ═══════════════════════════════════════════════

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ecommerce-api
    ports:
      - "${PORT:-5000}:5000"
    # ── Las variables se inyectan desde el archivo .env.production ──
    # Docker Compose lee el archivo y las pasa como variables de
    # entorno reales al contenedor, sin exponerlas en capas de la imagen.
    env_file:
      - .env.production
    depends_on:
      mongo:
        condition: service_healthy
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mongo:
    image: mongo:7
    container_name: ecommerce-mongo
    volumes:
      - mongo_data:/data/db
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongo_data:
